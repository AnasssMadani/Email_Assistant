services:
  - type: web
    name: accuse-reception-relance
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:all
    autoDeployTrigger: commit
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      # Filet de securite: sur certaines versions 22.x, node:sqlite exige
      # encore ce flag explicitement. Sans effet (juste un avertissement)
      # sur les versions ou il est deja actif par defaut.
      - key: NODE_OPTIONS
        value: --experimental-sqlite
      - key: DB_PATH
        value: /var/data/app.db
      - key: CONNECTION_STATE_PATH
        value: /var/data/connection.json
      - key: GOOGLE_TOKEN_PATH
        value: /var/data/gmail-token.json
      - key: AZURE_TOKEN_PATH
        value: /var/data/graph-token.json
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: AZURE_CLIENT_ID
        sync: false
      - key: AZURE_CLIENT_SECRET
        sync: false
      - key: AZURE_TENANT_ID
        sync: false
      - key: AZURE_REDIRECT_URI
        sync: false
      - key: SETUP_USERNAME
        sync: false
      - key: SETUP_PASSWORD_HASH
        sync: false
      # Deprecie, conserve declare pour eviter qu'une synchro de blueprint ne
      # supprime la valeur existante sur un service deja deploye.
      - key: SETUP_PASSWORD
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: BRAND_NAME
        value: Accusé & Relance
      - key: BRAND_PRIMARY_COLOR
        value: "#16202A"
      - key: BRAND_LOGO_URL
        sync: false
